name: Docker Publish

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  prepare-tag:
    needs: lint-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name || steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve existing tag
        id: resolve
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Bump patch tag
        id: bump
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --tags --force origin
            latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
            latest="${latest:-v0.0.0}"
            version="${latest#v}"
            IFS=. read -r major minor patch <<< "${version}"
            new_tag="v${major}.${minor}.$((patch + 1))"
            echo "Attempt ${attempt}: tagging ${new_tag} (previous: ${latest})"
            if git tag -a "${new_tag}" -m "Release ${new_tag}" && git push origin "refs/tags/${new_tag}"; then
              echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Push failed (tag may already exist); retrying after refetch"
            git tag -d "${new_tag}" 2>/dev/null || true
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Failed to push a unique tag after 3 attempts"
              exit 1
            fi
          done

  docker:
    needs: [lint-and-test, prepare-tag]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tag
        shell: bash
        env:
          TAG_NAME: ${{ needs.prepare-tag.outputs.tag_name }}
        run: |
          if [[ "${TAG_NAME}" == v* ]]; then
            VERSION="${TAG_NAME#v}"
            {
              echo "tags<<EOF"
              echo "ghcr.io/jasmeralia/steam-library-monitor:${VERSION}"
              echo "ghcr.io/jasmeralia/steam-library-monitor:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/jasmeralia/steam-library-monitor:manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}
